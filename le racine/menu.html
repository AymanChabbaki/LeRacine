<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Feuilletez notre album photo interactif et découvrez le cadre élégant, les plats savoureux et l'ambiance chaleureuse de Le Racine Casablanca.">
    <title>Galerie Photos — Le Racine Casablanca</title>
    
    <!-- CSS Stylesheet -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="assets/logo.jpg">
</head>
<body class="menu-page-body">
    <!-- Header Navigation -->
    <header class="menu-header">
        <div class="nav-container">
            <a href="index.html" class="logo-wrapper" id="galleryLogoLink">
                <img src="assets/logo.jpg" alt="Le Racine Logo" class="logo-img">
                <span class="logo-text">LE RACINE</span>
            </a>
            
            <a href="index.html" class="btn btn-back-home" id="btnBackHome">
                Retour à l'Accueil
            </a>
        </div>
    </header>
    <!-- Category Tabs Navigation -->
    <nav class="menu-book-tabs" id="galleryCategoryTabs">
        <button class="book-tab active" data-category="all">Tout</button>
        <button class="book-tab" data-category="ambiance">Ambiance & Décor</button>
        <button class="book-tab" data-category="plats">Gastronomie & Plats</button>
        <button class="book-tab" data-category="boissons">Bar & Boissons</button>
    </nav>
    <!-- Main Book Screen Wrapper -->
    <main class="book-wrapper">
        
        <!-- Desktop Nav Buttons -->
        <button class="book-nav-btn prev-btn" id="prevPageBtn" aria-label="Page précédente" disabled>
            &#8249;
        </button>
        <!-- 3D Book Container -->
        <div class="book-container" id="bookContainer">
            <!-- Dynamically populated by gallery.js -->
            <div class="gallery-loading">
                <div class="spinner"></div>
                <p>Chargement de l'album...</p>
            </div>
        </div>
        <button class="book-nav-btn next-btn" id="nextPageBtn" aria-label="Page suivante" disabled>
            &#8250;
        </button>
    </main>
    <!-- Mobile Page Navigation Indicators -->
    <footer class="mobile-book-indicators">
        <div class="indicators-container" id="mobileIndicators">
            <!-- Dynamically populated by gallery.js -->
        </div>
    </footer>
    <!-- JavaScript Interactive Logic -->
    <script src="assets/gallery/gallery_images.js"></script>
    <script src="gallery.js"></script>
</body>
</html>
